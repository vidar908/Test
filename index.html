<!DOCTYPE html>
<html lang="no">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klikk Spillet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #4FC3F7;
      font-family: Arial, sans-serif;
    }

    #box {
      width: 120px;
      height: 120px;
      background: red;
      color: white;
      font-size: 40px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 15px;
      border: none;
      cursor: pointer;
      position: absolute;
      transition: all 0.1s ease;
      user-select: none;
    }

    #box:hover {
      background: darkred;
      transform: scale(1.05);
    }

    #box:active {
      transform: scale(0.95);
    }

    #score-display {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    #funnyPic {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px;
      max-width: 80%;
      border-radius: 15px;
      z-index: 9999;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      from {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    #instructions {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: white;
      font-size: 14px;
      text-align: right;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>
  <div id="score-display">Score: 0</div>
  <button id="box" aria-label="Click to increase score">0</button>
  <div id="instructions">Click the box as fast as you can!<br>Every 10 clicks = 💥</div>

  <script>
    let score = 0;
    const box = document.getElementById('box');
    const scoreDisplay = document.getElementById('score-display');

    function moveBox() {
      const maxX = window.innerWidth - box.offsetWidth;
      const maxY = window.innerHeight - box.offsetHeight;
      
      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;
      
      box.style.left = randomX + 'px';
      box.style.top = randomY + 'px';
      
      const colors = ["red", "blue", "green", "yellow", "purple", "orange", "pink", "cyan"];
      box.style.background = colors[Math.floor(Math.random() * colors.length)];
    }

    function playSound() {
      // Create a simple beep sound using Web Audio API
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.1);
    }

    function handleClick() {
      score++;

      if (score % 10 === 0) {
        playSound();
        box.textContent = "💥";
        setTimeout(() => {
          box.textContent = score;
        }, 300);
      } else {
        box.textContent = score;
      }

      if (score % 20 === 0) {
        showCelebration();
      }

      scoreDisplay.textContent = "Score: " + score;
      moveBox();
    }

    function showCelebration() {
      // Create a festive celebration effect
      const celebration = document.createElement('div');
      celebration.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 80px;
        z-index: 9999;
        animation: celebrate 2s ease-out forwards;
      `;
      celebration.textContent = '🎉';
      document.body.appendChild(celebration);
      
      setTimeout(() => celebration.remove(), 2000);
    }

    // Add celebration animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes celebrate {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -150%) scale(2);
        }
      }
    `;
    document.head.appendChild(style);

    // Mouse click handler
    box.addEventListener('click', handleClick);

    // Keyboard accessibility (Enter and Space)
    box.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        handleClick();
      }
    });

    // Initialize box position on page load
    moveBox();
  </script>
</body>

</html>
