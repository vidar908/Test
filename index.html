<!DOCTYPE html>
<html lang="no">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klikk Spillet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #4FC3F7;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #box {
      width: 120px;
      height: 120px;
      background: red;
      color: white;
      font-size: 40px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 15px;
      border: none;
      cursor: pointer;
      position: absolute;
      transition: all 0.1s ease;
      user-select: none;
    }

    #box:hover {
      background: darkred;
      transform: scale(1.05);
    }

    #box:active {
      transform: scale(0.95);
    }

    #score-display {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    #instructions {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: white;
      font-size: 14px;
      text-align: right;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .explosion {
      position: fixed;
      pointer-events: none;
      font-size: 60px;
      animation: explode 1s ease-out forwards;
      z-index: 9998;
    }

    .message-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 0, 0, 0.9);
      color: white;
      padding: 30px 50px;
      border-radius: 20px;
      font-size: 36px;
      font-weight: bold;
      z-index: 9999;
      animation: popupShow 1.2s ease;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
      border: 3px solid yellow;
    }

    .character-walker {
      position: fixed;
      bottom: 80px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: walkAcross 5s ease-in-out forwards;
      z-index: 9998;
    }

    .walker-body {
      font-size: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sign {
      background: #FFD700;
      color: #000;
      padding: 15px 25px;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
      border: 4px solid #000;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.4);
    }

    .sneaky-character {
      position: fixed;
      bottom: 60px;
      display: flex;
      align-items: flex-end;
      gap: 15px;
      animation: sneakAcross 6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      z-index: 9998;
    }

    .sneaky-body {
      font-size: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0.8;
    }

    .sneaky-sign {
      background: #FF6B9D;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      white-space: nowrap;
      border: 3px solid #000;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
    }

    .peek-container {
      position: fixed;
      font-size: 100px;
      z-index: 9998;
      animation: peekInOut 3s ease-in-out forwards;
    }

    .peek-eyes {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .eyebrow {
      position: absolute;
      width: 50px;
      height: 14px;
      background: #000;
      border-radius: 15px;
      top: -35px;
    }

    .eyebrow-left {
      left: -70px;
      transform: rotate(-25deg);
    }

    .eyebrow-right {
      right: -70px;
      transform: rotate(25deg);
    }

    .peek-head {
      position: fixed;
      z-index: 9998;
      animation: peekHeadInOut 3s ease-in-out forwards;
    }

    .head-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .bushy-eyebrow {
      width: 55px;
      height: 16px;
      background: #1a1a1a;
      border-radius: 20px;
      margin: 5px 8px;
      position: relative;
    }

    .bushy-eyebrow::before,
    .bushy-eyebrow::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #1a1a1a;
      border-radius: 50%;
      top: -2px;
    }

    .bushy-eyebrow::before {
      left: -8px;
    }

    .bushy-eyebrow::after {
      right: -8px;
    }

    .storm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 8000;
      animation: stormDarken 0.5s ease-in forwards;
      pointer-events: none;
    }

    .thundercloud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(100, 100, 150, 0.4) 0%, rgba(50, 50, 80, 0.6) 100%);
      z-index: 8000;
      animation: cloudRoll 0.6s ease-in-out forwards;
    }

    .lightning-bolt {
      position: fixed;
      top: 0;
      left: 50%;
      width: 15px;
      height: 100vh;
      background: linear-gradient(90deg, transparent, #fff 45%, #fff 55%, transparent);
      z-index: 8001;
      animation: lightningFlash 0.1s ease-in-out;
      transform: translateX(-50%);
    }

    .lightning-bolt.bolt2 {
      left: 30%;
    }

    .lightning-bolt.bolt3 {
      left: 70%;
    }

    .bull-charge {
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 40px;
      z-index: 9997;
      animation: bullCharge 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transform: translate(-50%, -50%);
    }

    @keyframes explode {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.1) rotate(180deg);
      }
    }

    @keyframes popupShow {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);
      }
      40% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes celebrate {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -150%) scale(2);
      }
    }

    @keyframes walkAcross {
      0% {
        left: -200px;
      }
      100% {
        left: 100vw;
      }
    }

    @keyframes sneakAcross {
      0% {
        left: -200px;
        opacity: 0.6;
      }
      50% {
        opacity: 0.7;
      }
      100% {
        left: 100vw;
        opacity: 0.6;
      }
    }

    @keyframes peekInOut {
      0% {
        right: -150px;
        opacity: 0;
      }
      20% {
        right: 30px;
        opacity: 1;
      }
      80% {
        right: 30px;
        opacity: 1;
      }
      100% {
        right: -150px;
        opacity: 0;
      }
    }

    @keyframes peekHeadInOut {
      0% {
        right: -150px;
        opacity: 0;
      }
      20% {
        right: 30px;
        opacity: 1;
      }
      80% {
        right: 30px;
        opacity: 1;
      }
      100% {
        right: -150px;
        opacity: 0;
      }
    }

    @keyframes stormDarken {
      0% {
        background: transparent;
      }
      100% {
        background: rgba(40, 40, 60, 0.3);
      }
    }

    @keyframes cloudRoll {
      0%, 100% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes lightningFlash {
      0%, 100% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes bullCharge {
      0% {
        font-size: 40px;
        opacity: 0.3;
        transform: translate(-50%, -50%) scale(0.2);
      }
      50% {
        font-size: 150px;
        opacity: 1;
      }
      100% {
        font-size: 400px;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }
  </style>
</head>

<body>
  <div id="score-display">Score: 0</div>
  <button id="box" aria-label="Click to increase score">0</button>
  <div id="instructions">Click the box as fast as you can!<br>Every 10 clicks = 💥<br>Every 20 clicks = 🚶<br>Every 30 clicks = 🕵️<br>Every 50 clicks = 👀<br>Every 75 clicks = ⚡<br>Random = 🐂 CHARGE!</div>

  <script>
    let score = 0;
    const box = document.getElementById('box');
    const scoreDisplay = document.getElementById('score-display');
    let bullChargeTimeout = null;
    
    // Load the custom explosion sound
    const explosionSound = new Audio('https://raw.githubusercontent.com/vidar908/Test/main/Nytt%20opptak%202.m4a');

    function moveBox() {
      const maxX = window.innerWidth - box.offsetWidth;
      const maxY = window.innerHeight - box.offsetHeight;
      
      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;
      
      box.style.left = randomX + 'px';
      box.style.top = randomY + 'px';
      
      const colors = ["red", "blue", "green", "yellow", "purple", "orange", "pink", "cyan"];
      box.style.background = colors[Math.floor(Math.random() * colors.length)];
    }

    function playClickSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.1);
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.1);
    }

    function playExplosionSound() {
      explosionSound.currentTime = 0;
      explosionSound.volume = 0.8;
      explosionSound.play().catch(err => console.log('Sound play error:', err));
    }

    function playThunderSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      
      // Create a deep rumbling thunder sound
      const bufferSize = audioContext.sampleRate * 0.8;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      
      const noiseSource = audioContext.createBufferSource();
      noiseSource.buffer = noiseBuffer;
      
      const gainNode = audioContext.createGain();
      noiseSource.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.05, audioContext.currentTime + 0.8);
      
      noiseSource.start(audioContext.currentTime);
      noiseSource.stop(audioContext.currentTime + 0.8);
    }

    function playBullSnort() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      
      // Create snorting sound
      const bufferSize = audioContext.sampleRate * 0.4;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      
      const noiseSource = audioContext.createBufferSource();
      noiseSource.buffer = noiseBuffer;
      
      const gainNode = audioContext.createGain();
      noiseSource.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.02, audioContext.currentTime + 0.4);
      
      noiseSource.start(audioContext.currentTime);
      noiseSource.stop(audioContext.currentTime + 0.4);
      
      // Add low frequency for charging sound
      const oscillator = audioContext.createOscillator();
      const gainNode2 = audioContext.createGain();
      oscillator.connect(gainNode2);
      gainNode2.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.4);
      oscillator.type = 'sine';
      
      gainNode2.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.4);
    }

    function playBullCharge() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      
      // Create hoofbeats/charging sound
      for (let beat = 0; beat < 3; beat++) {
        const startTime = audioContext.currentTime + (beat * 0.3);
        
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(150 - beat * 20, startTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, startTime + 0.2);
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.4, startTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);
        
        oscillator.start(startTime);
        oscillator.stop(startTime + 0.2);
      }
    }

    function createBigExplosion() {
      const explosionCount = 30;
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const explosionEmojis = ['💥', '🔥', '⚡', '💫', '✨'];
      
      for (let i = 0; i < explosionCount; i++) {
        const explosion = document.createElement('div');
        explosion.className = 'explosion';
        explosion.textContent = explosionEmojis[Math.floor(Math.random() * explosionEmojis.length)];
        
        const angle = (i / explosionCount) * Math.PI * 2;
        const distance = 200 + Math.random() * 150;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        explosion.style.setProperty('--tx', tx + 'px');
        explosion.style.setProperty('--ty', ty + 'px');
        
        explosion.style.left = centerX + 'px';
        explosion.style.top = centerY + 'px';
        explosion.style.fontSize = (40 + Math.random() * 40) + 'px';
        
        document.body.appendChild(explosion);
        setTimeout(() => explosion.remove(), 1000);
      }
    }

    function showMessage(text) {
      const popup = document.createElement('div');
      popup.className = 'message-popup';
      popup.textContent = text;
      document.body.appendChild(popup);
      
      setTimeout(() => popup.remove(), 1200);
    }

    function showCelebration() {
      for (let i = 0; i < 3; i++) {
        const celebration = document.createElement('div');
        celebration.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          font-size: 80px;
          z-index: 9999;
          animation: celebrate 2s ease-out forwards;
        `;
        celebration.textContent = '🎉';
        document.body.appendChild(celebration);
        
        setTimeout(() => {
          celebration.remove();
        }, 2000 + i * 300);
      }
    }

    function showCharacterWalking() {
      const walker = document.createElement('div');
      walker.className = 'character-walker';
      
      const body = document.createElement('div');
      body.className = 'walker-body';
      body.textContent = '🚶';
      
      const sign = document.createElement('div');
      sign.className = 'sign';
      sign.textContent = 'You can do it!';
      
      walker.appendChild(body);
      walker.appendChild(sign);
      
      document.body.appendChild(walker);
      setTimeout(() => walker.remove(), 5000);
    }

    function showSneakyCharacter() {
      const sneaky = document.createElement('div');
      sneaky.className = 'sneaky-character';
      
      const body = document.createElement('div');
      body.className = 'sneaky-body';
      body.textContent = '🕵️';
      
      const sign = document.createElement('div');
      sign.className = 'sneaky-sign';
      sign.textContent = 'You can do this!';
      
      sneaky.appendChild(body);
      sneaky.appendChild(sign);
      
      document.body.appendChild(sneaky);
      setTimeout(() => sneaky.remove(), 6000);
    }

    function showCharacterPeek() {
      const peek = document.createElement('div');
      peek.className = 'peek-container';
      
      const eyesContainer = document.createElement('div');
      eyesContainer.className = 'peek-eyes';
      eyesContainer.textContent = '👀';
      
      const leftBrow = document.createElement('div');
      leftBrow.className = 'eyebrow eyebrow-left';
      eyesContainer.appendChild(leftBrow);
      
      const rightBrow = document.createElement('div');
      rightBrow.className = 'eyebrow eyebrow-right';
      eyesContainer.appendChild(rightBrow);
      
      peek.appendChild(eyesContainer);
      peek.style.top = '30vh';
      
      document.body.appendChild(peek);
      setTimeout(() => peek.remove(), 3000);
    }

    function showHeadPeek() {
      const headPeek = document.createElement('div');
      headPeek.className = 'peek-head';
      
      const headTop = document.createElement('div');
      headTop.className = 'head-top';
      
      const leftBrow = document.createElement('div');
      leftBrow.className = 'bushy-eyebrow';
      headTop.appendChild(leftBrow);
      
      const eyes = document.createElement('div');
      eyes.style.fontSize = '60px';
      eyes.textContent = '👀';
      headTop.appendChild(eyes);
      
      const rightBrow = document.createElement('div');
      rightBrow.className = 'bushy-eyebrow';
      headTop.appendChild(rightBrow);
      
      headPeek.appendChild(headTop);
      headPeek.style.top = '20vh';
      
      document.body.appendChild(headPeek);
      setTimeout(() => headPeek.remove(), 3000);
    }

    function showThunderstorm() {
      playThunderSound();
      
      // Dark overlay
      const overlay = document.createElement('div');
      overlay.className = 'storm-overlay';
      document.body.appendChild(overlay);
      
      // Thunder cloud
      const cloud = document.createElement('div');
      cloud.className = 'thundercloud';
      document.body.appendChild(cloud);
      
      // Lightning bolts
      setTimeout(() => {
        const bolt1 = document.createElement('div');
        bolt1.className = 'lightning-bolt';
        document.body.appendChild(bolt1);
        setTimeout(() => bolt1.remove(), 150);
      }, 100);
      
      setTimeout(() => {
        const bolt2 = document.createElement('div');
        bolt2.className = 'lightning-bolt bolt2';
        document.body.appendChild(bolt2);
        setTimeout(() => bolt2.remove(), 150);
      }, 300);
      
      setTimeout(() => {
        const bolt3 = document.createElement('div');
        bolt3.className = 'lightning-bolt bolt3';
        document.body.appendChild(bolt3);
        setTimeout(() => bolt3.remove(), 150);
      }, 500);
      
      setTimeout(() => {
        overlay.remove();
        cloud.remove();
      }, 800);
    }

    function showBullCharge() {
      playBullSnort();
      setTimeout(() => playBullCharge(), 200);
      
      const bull = document.createElement('div');
      bull.className = 'bull-charge';
      bull.textContent = '🐂';
      
      document.body.appendChild(bull);
      setTimeout(() => bull.remove(), 2000);
      
      // Schedule next bull charge randomly between 8-20 seconds
      scheduleBullCharge();
    }

    function scheduleBullCharge() {
      if (bullChargeTimeout) {
        clearTimeout(bullChargeTimeout);
      }
      const randomDelay = Math.random() * 12000 + 8000; // 8-20 seconds
      bullChargeTimeout = setTimeout(() => {
        showBullCharge();
      }, randomDelay);
    }

    function handleClick() {
      score++;

      playClickSound();

      if (score % 10 === 0) {
        playExplosionSound();
        createBigExplosion();
        showMessage('helt ærlig bror 💥');
        box.textContent = "💥";
        setTimeout(() => {
          box.textContent = score;
        }, 300);
      } else {
        box.textContent = score;
      }

      if (score % 75 === 0) {
        // Show thunderstorm at 75, 150, 225, etc.
        showThunderstorm();
      } else if (score % 50 === 0) {
        // Show peek at 50, 100, 150, etc. (but not 75, 150, etc.)
        showCharacterPeek();
      } else if (score % 30 === 0) {
        // Show sneaky character at 30, 60, 90, etc. (but not 50, 75, etc.)
        showSneakyCharacter();
      } else if (score % 20 === 0) {
        // Show walking character at 20, 40, 60, 80, etc. (but not 30, 50, 75, etc.)
        showCharacterWalking();
        showCelebration();
      }

      scoreDisplay.textContent = "Score: " + score;
      moveBox();
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes celebrate {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -150%) scale(2);
        }
      }
    `;
    document.head.appendChild(style);

    box.addEventListener('click', handleClick);

    box.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        handleClick();
      }
    });

    moveBox();
    
    // Start the random bull charge schedule
    scheduleBullCharge();
  </script>
</body>

</html>
